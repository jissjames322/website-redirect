<!DOCTYPE html>
<html>
<head>
<title>Jiss | Portfolio</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:white;
overflow:hidden;
font-family:Arial, sans-serif;
}

canvas{
position:absolute;
top:0;
left:0;
z-index:0;
}

/* Button style */

button{
padding:18px 40px;
font-size:20px;
border:3px solid black;
border-radius:12px;
background:white;
color:black;
cursor:pointer;
position:relative;
z-index:10;
transition:all 0.15s ease;

/* comic shadow */
box-shadow:6px 6px 0px black;
}

/* hover effect */

button:hover{
transform:translate(-4px,-4px);
box-shadow:10px 10px 0px black;
}

button:active{
transform:translate(2px,2px);
box-shadow:2px 2px 0px black;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<button onclick="openPortfolio()">View Portfolio</button>

<script>

function openPortfolio(){
window.open("https://jissportfolio.framer.website/","_blank");
}

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
});
}

let mouse={x:0,y:0};

window.addEventListener("mousemove",e=>{
mouse.x=e.x;
mouse.y=e.y;
});

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

let dx=mouse.x-p.x;
let dy=mouse.y-p.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<120){
p.x-=dx*0.02;
p.y-=dy*0.02;
}

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle="black";
ctx.fill();

});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
